spec: flatmachine
spec_version: 3.0.0
data:
  name: codex-cli-fanout-cache-demo-v4
  context:
    thread_id: ''
  agents:
    seeder:
      spec: flatagent
      spec_version: "4.0.0"
      data:
        prompt: ./prompts/seed.prompt.yml
        profile: codex-readonly
  machines:
    ask_q1: ./ask_q1.yml
    ask_q2: ./ask_q2.yml
    ask_q3: ./ask_q3.yml
  states:
    start:
      type: initial
      transitions:
      - to: seed
      hooks: codex-cli-hooks
    seed:
      agent: seeder
      output_to_context:
        seed_result: output.result
        thread_id: output.thread_id
      transitions:
      - to: fanout
      hooks: codex-cli-hooks
    fanout:
      machine:
      - ask_q1
      - ask_q2
      - ask_q3
      input:
        thread_id: context.thread_id
      output_to_context:
        fanout_results: '{{ output }}'
      transitions:
      - to: done
      hooks: codex-cli-hooks
    done:
      type: final
      output:
        seed_result: context.seed_result
        thread_id: context.thread_id
        fanout_results: context.fanout_results
      hooks: codex-cli-hooks
  lifecycle_hooks: codex-cli-hooks
metadata:
  description: Prompt/profile/flatagent fanout cache demo for Codex CLI
  tags:
  - codex-cli
  - cache
  - fanout
  - parallel
  - demo
  - flatagent
  - prompt-profile
