spec: flatmachine
spec_version: "3.0.0"
data:
  name: ask-q1-v4
  context:
    thread_id: input.thread_id
  agents:
    asker:
      spec: flatagent
      spec_version: "4.0.0"
      data:
        prompt: ./prompts/ask_q1.prompt.yml
        profile: codex-readonly
  states:
    start:
      type: initial
      transitions:
        - to: ask
    ask:
      agent: asker
      input:
        resume_session: context.thread_id
      output_to_context:
        answer: output.result
      transitions:
        - to: done
    done:
      type: final
      output:
        question: "build hash"
        answer: context.answer
