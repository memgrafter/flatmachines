spec: flatmachine
spec_version: 2.0.0
data:
  name: echo_processor
  context:
    delay_seconds: 1
  states:
    start:
      type: initial
      transitions:
      - to: process
      hooks: distributed-worker
    process:
      action: echo_delay
      output_to_context:
        processed: '{{ output.processed }}'
      transitions:
      - to: done
      hooks: distributed-worker
    done:
      type: final
      output:
        status: completed
        processed: '{{ context.processed }}'
      hooks: distributed-worker
