spec: flatmachine
spec_version: "2.0.0"

data:
  name: tool-read
  context:
    path: "{{ input.path }}"
    offset: "{{ input.offset | default(None) }}"
    limit: "{{ input.limit | default(None) }}"
    working_dir: "{{ input.working_dir }}"
    tool_content: ""
    tool_is_error: false

  states:
    start:
      type: initial
      transitions:
        - to: execute

    execute:
      action: tool_read
      on_error:
        default: error
      transitions:
        - to: done

    error:
      type: final
      output:
        content: "{{ context.last_error }}"
        is_error: true

    done:
      type: final
      output:
        content: "{{ context.tool_content }}"
        is_error: "{{ context.tool_is_error }}"

metadata:
  description: "Read tool as ephemeral flatmachine"
  tags: ["tool", "read", "ephemeral"]
  tool_type: ephemeral
