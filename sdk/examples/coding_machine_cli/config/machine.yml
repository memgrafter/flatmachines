spec: flatmachine
spec_version: "2.0.0"

data:
  name: cli-tool-loop
  context:
    task: "{{ input.task }}"
    working_dir: "{{ input.working_dir }}"
    human_approved: false

  agents:
    coder: ./agent.yml

  # Tool machines — each tool call launches an ephemeral child FlatMachine.
  # Gives every tool invocation its own execution_id, hooks lifecycle,
  # error handling, and observability. Set tool_type: "long-lived" in a
  # tool's metadata to enable persistence/checkpointing for complex tools.
  tool_machines:
    bash: ./tools/bash.yml
    read: ./tools/read.yml
    write: ./tools/write.yml
    edit: ./tools/edit.yml

  states:
    start:
      type: initial
      transitions:
        - to: work

    work:
      agent: coder
      tool_loop:
        max_turns: 30
        max_tool_calls: 100
        max_cost: 2.00
        tool_timeout: 60
        total_timeout: 600
      input:
        task: "{{ context.task }}"
      output_to_context:
        result: "{{ output.content }}"
      transitions:
        - to: human_review

    human_review:
      action: human_review
      transitions:
        - condition: "context.human_approved == true"
          to: done
        - to: work

    done:
      type: final
      output:
        result: "{{ context.result }}"

metadata:
  description: "CLI coding agent with tool loop and human-in-the-loop review"
  tags: ["tool-use", "cli", "human-in-loop"]
