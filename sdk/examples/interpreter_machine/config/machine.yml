spec: flatmachine
spec_version: "2.5.0"

data:
  name: interpreter-machine
  context:
    statement: "{{ input.statement }}"
    working_dir: "{{ input.working_dir }}"
    thread_id: ""

  agents:
    interpreter:
      type: codex-cli
      ref: ./codex-cli.profile.yml

  states:
    start:
      type: initial
      transitions:
        - to: interpret

    interpret:
      agent: interpreter
      input:
        task: |
          You are an interpretation agent. Your job is to deeply interpret a
          user's statement — what they mean, what they might really be asking
          for, what assumptions they hold, what adjacent ideas connect.

          Statement: "{{ context.statement }}"
          Working directory: {{ context.working_dir }}

          Process:
          1. Interpret the statement from multiple angles (literal meaning,
             deeper intent, assumptions, related concepts, potential
             misunderstandings, and what may be unsaid).
          2. Survey local files/directories to ground the interpretation in
             this actual project context.
          3. Read INTERPRETATIONS.md at the working directory root.
          4. Compare your interpretation with existing entries.
          5. Edit INTERPRETATIONS.md to add a new interpretation near the most
             similar entries, or create a new thematic section if needed.

          Rules:
          - NEVER delete or modify existing interpretations.
          - Preserve ambiguity and disagreement; do not flatten nuance.
          - If INTERPRETATIONS.md does not exist, create it with a header.
          - Use this entry format:

            ### [short title]
            > Original statement: "{{ context.statement }}"

            [2-5 paragraphs of interpretation grounded in local context]

            *Connections: [which existing interpretations this relates to and how]*

          After editing the file, provide a concise summary of what you added.
      output_to_context:
        result: "{{ output.result }}"
        thread_id: "{{ output.thread_id }}"
      transitions:
        - to: done

    done:
      type: final
      output:
        result: "{{ context.result }}"
        thread_id: "{{ context.thread_id }}"

metadata:
  description: "Interpreter machine — takes a statement, interprets it, and adds to INTERPRETATIONS.md"
  tags: ["codex-cli", "cli", "interpretation", "knowledge"]
