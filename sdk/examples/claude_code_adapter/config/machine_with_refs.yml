spec: flatmachine
spec_version: 2.0.0
data:
  name: claude-code-ref-example
  context:
    feature: '{{ input.feature }}'
    working_dir: '{{ input.working_dir }}'
    session_id: ''
    plan: ''
  agents:
    planner:
      type: claude-code
      ref: ./claude-planner.json
    coder:
      type: claude-code
      ref: ./claude-coder.json
    reviewer:
      type: claude-code
      ref: ./claude-coder.json
      config:
        max_budget_usd: 1.0
        effort: low
  states:
    start:
      type: initial
      transitions:
      - to: plan
      hooks: claude-code-hooks
    plan:
      agent: planner
      input:
        task: 'Plan the implementation of: {{ context.feature }}. Read the codebase first.'
      output_to_context:
        session_id: '{{ output.session_id }}'
        plan: '{{ output.result }}'
      transitions:
      - to: implement
      hooks: claude-code-hooks
    implement:
      agent: coder
      input:
        task: 'Implement this plan:

          {{ context.plan }}

          '
      output_to_context:
        result: '{{ output.result }}'
        session_id: '{{ output.session_id }}'
      transitions:
      - to: review
      hooks: claude-code-hooks
    review:
      agent: reviewer
      input:
        task: Review the implementation. Check for bugs, missing tests, and style issues.
      output_to_context:
        review: '{{ output.result }}'
      transitions:
      - to: done
      hooks: claude-code-hooks
    done:
      type: final
      output:
        result: '{{ context.result }}'
        review: '{{ context.review }}'
      hooks: claude-code-hooks
metadata:
  description: 'Claude Code example using file refs for per-agent config.

    Agent configs are resolved from JSON files at load time and

    embedded in checkpoints, so resume works without path resolution.

    '
  tags:
  - claude-code
  - file-refs
  - multi-agent
