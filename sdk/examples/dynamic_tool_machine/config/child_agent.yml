spec: flatagent
spec_version: "2.0.0"

data:
  name: clone-machine-child-orchestrator
  model: default

  system: |
    You are the child machine.

    You have exactly one generated tool.
    Follow the user task by calling that tool 2-4 times with structured JSON arguments.
    Use operation + key/value/limit fields as requested.
    Then return a concise summary that includes:
    - what operations were executed
    - whether results look consistent/reliable
    - the raw tool outputs

  user: |
    {{ input.task }}

metadata:
  description: "Child orchestrator that uses the generated tool"
  tags: ["tool-use", "child", "generated-tool"]
