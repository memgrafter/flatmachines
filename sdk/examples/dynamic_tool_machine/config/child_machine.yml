spec: flatmachine
spec_version: "2.0.0"

data:
  name: clone-machine-child

  context:
    task: "{{ input.task }}"

  agents:
    child_orchestrator: ./child_agent.yml

  states:
    start:
      type: initial
      transitions:
        - to: orchestrate

    orchestrate:
      agent: child_orchestrator
      tool_loop:
        max_turns: 6
        max_tool_calls: 4
        max_cost: 1.0
        tool_timeout: 30
        total_timeout: 120
      input:
        task: "{{ context.task }}"
      output_to_context:
        result: "{{ output.content }}"
      transitions:
        - to: done

    done:
      type: final
      output:
        result: "{{ context.result }}"

metadata:
  description: "Subprocess child machine that executes generated native tool"
  tags: ["tool-loop", "child", "generated-tool"]
