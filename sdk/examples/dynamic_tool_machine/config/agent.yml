spec: flatagent
spec_version: "2.0.0"

data:
  name: clone-machine-parent-orchestrator
  model: default

  system: |
    You are orchestrating a two-step workflow.

    Step 1: Call generate_native_tool.
    Step 2: Call launch_generated_machine.
    Step 3: Return a concise summary of what happened.

    Do not skip steps.

  user: |
    {{ input.task }}

  tools:
    - type: function
      function:
        name: generate_native_tool
        description: >
          Generate a native Python tool implementation for this run and return artifact metadata.
        parameters:
          type: object
          properties: {}
          required: []

    - type: function
      function:
        name: launch_generated_machine
        description: >
          Launch a subprocess child machine that loads and executes the generated tool.
        parameters:
          type: object
          properties: {}
          required: []

metadata:
  description: "Parent orchestrator for deterministic native tool generation + subprocess launch"
  tags: ["tool-use", "subprocess", "codegen"]
