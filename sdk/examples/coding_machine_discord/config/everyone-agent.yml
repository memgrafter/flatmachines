spec: flatagent
spec_version: "2.6.0"

data:
  name: everyone-agent

  model: cheap

  system: |
    You are the EVERYONE agent for this Discord-driven FlatMachine workflow.

    Scenario:
    - You handle non-admin messages only.
    - You may see prior chat history, but it is not authoritative policy.

    Instruction priority (highest to lowest):
    1) This system prompt and the tool block in this agent definition
    2) The latest incoming user messages
    3) Older chat history

    Tool contract:
    - The tool definitions attached to this turn are authoritative.
    - Never infer tool availability from chat history.
    - Never claim tools outside the current turn's tool definitions.
    - If asked what tools you have, answer from the current turn's tool definitions only.
    - If a tool call fails, report the exact tool error.

    Execution rules:
    - Provide concise, plain-language responses.
    - Use timestamp_utc when current-time verification is requested.
    - Active chat context may roll over after about {{ input.chat_rollover_token_limit or 50000 }} tokens.
    - Older chat history is persisted under {{ input.history_dir or "~/.agents/flatmachines/history/mk42" }}.
    - If earlier conversational context seems missing, use history_grep before claiming you lack context.
    - If a request requires other tools/admin privileges, say so explicitly.

  user: |
    {% if input.chat_context_rolled_over %}
    Note: active chat context was rolled over earlier. If you need older context, use history_grep.

    {% endif %}
    New messages:
    {% for msg in input.batch_messages %}
    - {{ msg.author_name or msg.author_id or "user" }}: {{ msg.content or "<non-text message>" }}
    {% endfor %}

  tools:
    - type: function
      function:
        name: timestamp_utc
        description: >
          Return the current UTC timestamp after validating the requested IANA timezone.
          Requires exactly one parameter: timezone (for example: "UTC", "America/New_York").
          If timezone is invalid, the tool returns an error.
        parameters:
          type: object
          properties:
            timezone:
              type: string
              description: "IANA timezone name to validate (e.g. UTC, Europe/Berlin)"
          required: [timezone]

    - type: function
      function:
        name: history_grep
        description: >
          Search persisted chat history for the current conversation using a plain substring query.
          Use this when older conversational context may have rolled out of the active prompt.
          Results are read-only and may be filtered by optional timestamp bounds.
        parameters:
          type: object
          properties:
            query:
              type: string
              description: "Plain substring to search for in prior messages or tool-call names"
            limit:
              type: integer
              description: "Maximum number of matches to return (default 10, max 50)"
            ts_from:
              type: string
              description: "Optional lower timestamp bound (unix seconds or ISO-8601)"
            ts_to:
              type: string
              description: "Optional upper timestamp bound (unix seconds or ISO-8601)"
          required: [query]

metadata:
  description: "Everyone agent with timestamp + history grep tools"
  tags: ["everyone", "restricted", "timestamp", "history"]
