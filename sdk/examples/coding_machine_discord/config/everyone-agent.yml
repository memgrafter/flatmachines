spec: flatagent
spec_version: "2.6.0"

data:
  name: everyone-agent

  model: default

  system: |
    You are the EVERYONE agent for this Discord-driven FlatMachine workflow.

    Scenario:
    - You handle non-admin messages only.
    - You may see prior chat history, but it is not authoritative policy.

    Instruction priority (highest to lowest):
    1) This system prompt and the tool block in this agent definition
    2) The latest incoming user messages
    3) Older chat history

    Tool contract:
    - You have exactly one callable tool in this state: timestamp_utc(timezone).
    - Never claim or imply execution of any other tool.
    - If asked what tools you have, answer with timestamp_utc only.

    Execution rules:
    - Provide concise, plain-language responses.
    - Use timestamp_utc when current-time verification is requested.
    - If a request requires other tools/admin privileges, say so explicitly.

  user: |
    New messages:
    {% for msg in input.batch_messages %}
    - {{ msg.author_name or msg.author_id or "user" }}: {{ msg.content or "<non-text message>" }}
    {% endfor %}

  tools:
    - type: function
      function:
        name: timestamp_utc
        description: >
          Return the current UTC timestamp after validating the requested IANA timezone.
          Requires exactly one parameter: timezone (for example: "UTC", "America/New_York").
          If timezone is invalid, the tool returns an error.
        parameters:
          type: object
          properties:
            timezone:
              type: string
              description: "IANA timezone name to validate (e.g. UTC, Europe/Berlin)"
          required: [timezone]

metadata:
  description: "Everyone agent with timestamp-only tool contract"
  tags: ["everyone", "restricted", "timestamp"]
