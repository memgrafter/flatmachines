spec: flatmachine
spec_version: "2.6.0"

data:
  name: discord-tool-loop-resume
  context:
    task: input.task
    latest_user_request: input.latest_user_request
    batch_messages: input.batch_messages
    queued_message_count: input.queued_message_count
    conversation_key: input.conversation_key
    working_dir: input.working_dir

  agents:
    coder: ./agent.yml

  states:
    start:
      type: initial
      transitions:
        - to: work

    work:
      agent: coder
      tool_loop:
        max_turns: 30
        max_tool_calls: 100
        max_cost: 2.00
        tool_timeout: 60
        total_timeout: 600
      input:
        task: context.task
        latest_user_request: context.latest_user_request
        batch_messages: context.batch_messages
        queued_message_count: context.queued_message_count
        conversation_key: context.conversation_key
        session_id: context.machine.execution_id
      output_to_context:
        result: "{{ output.content }}"
      transitions:
        - to: post_result

    post_result:
      action: post_result
      transitions:
        - to: wait_for_feedback

    wait_for_feedback:
      wait_for: "discord/{{ context.conversation_key }}"
      output_to_context:
        task: output.latest_user_request
        latest_user_request: output.latest_user_request
        batch_messages: output.batch_messages
        queued_message_count: output.queued_message_count
      transitions:
        - to: merge_feedback

    merge_feedback:
      action: queue_feedback
      transitions:
        - to: work

metadata:
  description: "Discord coding machine that waits for external signal and resumes the same execution"
  tags: ["tool-use", "discord", "resume", "wait-for-signal"]
