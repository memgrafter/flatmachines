spec: flatmachine
spec_version: "2.6.0"

data:
  name: discord-tool-loop
  context:
    task: input.task
    latest_user_request: input.latest_user_request
    batch_messages: input.batch_messages
    queued_message_count: input.queued_message_count
    conversation_key: input.conversation_key
    _tool_loop_chain: input._tool_loop_chain
    _tool_loop_chain_state: input._tool_loop_chain_state
    _tool_loop_chain_agent: input._tool_loop_chain_agent
    working_dir: input.working_dir
    history_dir: input.history_dir
    chat_rollover_token_limit: input.chat_rollover_token_limit
    chat_context_rolled_over: false
    chat_context_rollover_count: 0
    chat_context_rollover_generation: 0
    chat_context_needs_history_lookup: false
    human_approved: false

  agents:
    coder: ./admin-agent.yml
    everyone: ./everyone-agent.yml

  states:
    start:
      type: initial
      transitions:
        - to: work

    work:
      agent: coder
      tool_loop:
        max_turns: 30
        max_tool_calls: 100
        max_cost: 2.00
        tool_timeout: 60
        total_timeout: 600
      input:
        task: context.task
        latest_user_request: context.latest_user_request
        batch_messages: context.batch_messages
        queued_message_count: context.queued_message_count
        conversation_key: context.conversation_key
        history_dir: context.history_dir
        chat_rollover_token_limit: context.chat_rollover_token_limit
        chat_context_rolled_over: context.chat_context_rolled_over
        chat_context_rollover_count: context.chat_context_rollover_count
        chat_context_needs_history_lookup: context.chat_context_needs_history_lookup
      output_to_context:
        result: "{{ output.content }}"
      transitions:
        - to: human_review

    human_review:
      action: human_review
      transitions:
        - condition: "context.human_approved == true"
          to: done
        - to: work

    done:
      type: final
      output:
        result: "{{ context.result }}"

metadata:
  description: "Coding machine tool loop (copied from coding_machine_cli) for Discord queue integration"
  tags: ["tool-use", "discord", "human-in-loop"]
