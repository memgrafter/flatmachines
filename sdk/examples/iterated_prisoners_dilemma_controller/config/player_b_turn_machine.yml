spec: flatmachine
spec_version: "2.0.0"

data:
  name: ipd-player-b-turn

  context:
    round: input.round
    rounds_total: input.rounds_total
    moves_a: input.moves_a
    moves_b: input.moves_b
    last_move_a: input.last_move_a
    last_move_b: input.last_move_b

  machines:
    player: ./player_machine.yml

  states:
    start:
      type: initial
      machine: player
      input:
        role: Player B
        round: context.round
        rounds_total: context.rounds_total
        own_history: context.moves_b
        opponent_history: context.moves_a
        opponent_last_move: context.last_move_a
      output_to_context:
        move: output.move
        decision_raw: output.decision_raw
      transitions:
        - to: done

    done:
      type: final
      output:
        move: context.move
        decision_raw: context.decision_raw
