spec: flatmachine
spec_version: "2.0.0"

data:
  name: ipd-match

  hooks: ipd-match-hooks

  context:
    rounds_total: input.rounds_total
    round: 1
    done: false
    moves_a: []
    moves_b: []
    history: []
    totals:
      A: 0
      B: 0
    cooperation_count:
      A: 0
      B: 0
    defection_count:
      A: 0
      B: 0
    last_round: null
    last_move_a: null
    last_move_b: null

  machines:
    player_a_turn: ./player_a_turn_machine.yml
    player_b_turn: ./player_b_turn_machine.yml

  states:
    start:
      type: initial
      action: init_match
      transitions:
        - to: play_round

    play_round:
      machine: [player_a_turn, player_b_turn]
      mode: settled
      input:
        round: context.round
        rounds_total: context.rounds_total
        moves_a: context.moves_a
        moves_b: context.moves_b
        last_move_a: context.last_move_a
        last_move_b: context.last_move_b
      output_to_context:
        move_a: output.player_a_turn.move
        decision_raw_a: output.player_a_turn.decision_raw
        move_b: output.player_b_turn.move
        decision_raw_b: output.player_b_turn.decision_raw
      transitions:
        - to: score_round

    score_round:
      action: score_round
      transitions:
        - condition: "context.done == true"
          to: done
        - to: play_round

    done:
      type: final
      output:
        rounds_total: context.rounds_total
        history: context.history
        totals: context.totals
        moves_a: context.moves_a
        moves_b: context.moves_b
        cooperation_count: context.cooperation_count
        defection_count: context.defection_count
        cooperation_rate: context.cooperation_rate
        defection_rate: context.defection_rate
