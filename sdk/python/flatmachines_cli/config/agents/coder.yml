spec: flatagent
spec_version: "2.5.0"

data:
  name: self-improve-coder

  model: default

  system: |
    You are an expert coding assistant. You have access to tools for reading files,
    writing files, executing bash commands, and making surgical edits.

    Guidelines:
    - Use bash for file operations like ls, grep, find
    - Use read to examine files before editing
    - Use edit for precise changes (old text must match exactly, including whitespace)
    - Use write only for new files or complete rewrites
    - Be concise in your responses

  user: |
    {{ input.task }}

    ## Experiment Loop

    Follow this loop. Try to complete as many iterations as possible:

    1. Read context: `cat .self_improve/archive_summary.tsv 2>/dev/null; git log --oneline -20; cat ideas.md 2>/dev/null`
    2. Run benchmark: `{{ input.benchmark_command }} > run.log 2>&1; grep "^METRIC" run.log`
    3. Analyze the code for the highest-impact improvement
    4. Edit code — one focused change
    5. Run benchmark again: `{{ input.benchmark_command }} > run.log 2>&1; grep "^METRIC" run.log`
    6. Compare results:
       - If {{ input.metric_name }} improved ({{ input.metric_direction }} is better): `git add -A && git commit -m "description of change"`
       - If equal or worse: `git checkout -- . && git clean -fd` to revert
    7. Log ideas for future iterations to ideas.md
    8. Go back to step 3 and try another improvement

    If a run crashes, check `tail -50 run.log`. If it's a fixable bug, fix it and re-run.
    If fundamentally broken, revert and try something else.

    Do not stop to ask for permission. Keep iterating. If you run out of ideas,
    read the code more carefully, try combining previous near-misses, or try
    more radical changes.

  tools:
    - type: function
      function:
        name: read
        description: >
          Read the contents of a file. Output is truncated to 2000 lines or 50KB.
          Use offset/limit for large files.
        parameters:
          type: object
          properties:
            path:
              type: string
              description: "Path to the file to read (relative or absolute)"
            offset:
              type: number
              description: "Line number to start reading from (1-indexed)"
            limit:
              type: number
              description: "Maximum number of lines to read"
          required: [path]

    - type: function
      function:
        name: bash
        description: >
          Execute a bash command. Returns stdout and stderr. Use for running
          benchmarks, tests, and exploring the codebase.
        parameters:
          type: object
          properties:
            command:
              type: string
              description: "Bash command to execute"
            timeout:
              type: number
              description: "Timeout in seconds (default 120)"
          required: [command]

    - type: function
      function:
        name: write
        description: >
          Write content to a file. Creates parent directories automatically.
          Use for new files or complete rewrites.
        parameters:
          type: object
          properties:
            path:
              type: string
              description: "Path to the file to write"
            content:
              type: string
              description: "Content to write to the file"
          required: [path, content]

    - type: function
      function:
        name: edit
        description: >
          Edit a file by replacing exact text. The oldText must match exactly
          (including whitespace).
        parameters:
          type: object
          properties:
            path:
              type: string
              description: "Path to the file to edit"
            oldText:
              type: string
              description: "Exact text to find and replace"
            newText:
              type: string
              description: "New text to replace with"
          required: [path, oldText, newText]

metadata:
  description: "Autonomous self-improvement agent. Owns the full experiment loop."
  tags:
    - self-improvement
    - coding
    - tool-loop
