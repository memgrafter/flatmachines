spec: flatmachine
spec_version: "2.5.0"

data:
  name: self-improve
  max_steps: 500

  context:
    # Target
    working_dir: "{{ input.working_dir | default('.') }}"

    # Outer loop state
    max_generations: 1
    generation: 0
    parent_id: null
    parent_score: null
    sibling_summary: []
    parent_selection: "{{ input.parent_selection | default('best') }}"

    # Shared state
    best_score: null
    archive_size: 0

  agents:
    coder: ./agents/agent.yml

  states:
    start:
      type: initial
      transitions:
        - to: select_parent

    # ── Outer Loop: Generation Management ──

    select_parent:
      action: select_parent_from_archive
      transitions:
        - to: setup_worktree

    setup_worktree:
      action: create_isolated_worktree
      transitions:
        - to: improve

    # ── Agent owns the full experiment lifecycle ──

    improve:
      agent: coder
      tool_loop:
        max_turns: 30
        max_tool_calls: 100
        max_cost: 2.00
        tool_timeout: 120
        total_timeout: 600
      input:
        working_dir: "{{ context.worktree_path | default(context.working_dir) }}"

      output_to_context:
        analysis: "{{ output.content }}"
      transitions:
        - to: archive_generation

    # ── Back to Outer Loop ──

    archive_generation:
      action: extract_diff_and_archive
      transitions:
        - to: cleanup_worktree

    cleanup_worktree:
      action: cleanup_isolated_worktree
      transitions:
        - to: outer_budget_check

    outer_budget_check:
      transitions:
        - condition: "context.generation >= context.max_generations"
          to: done
        - to: select_parent

    done:
      type: final
      output:
        generations: "{{ context.generation }}"
        archive_size: "{{ context.archive_size }}"
        best_score: "{{ context.best_score }}"
        best_generation: "{{ context.best_generation | default(0) }}"
        summary: >
          Self-improvement complete. {{ context.generation }} generations,
          {{ context.archive_size }} variants in archive.
          Best score: {{ context.best_score }}
          from generation {{ context.best_generation | default(0) }}.

metadata:
  description: >
    Self-improvement loop. Agent owns the full experiment lifecycle
    (discover/write benchmark, measure, edit, commit/revert, repeat).
    Machine handles only infrastructure: worktree isolation, archive,
    parent selection, cleanup.
  tags:
    - self-improvement
    - coding-machine
    - experiment-loop
