spec: flatmachine
spec_version: "2.5.0"

data:
  name: self-improve
  max_steps: 500

  context:
    # Target
    working_dir: "{{ input.working_dir | default('.') }}"
    git_enabled: "{{ input.git_enabled | default(false) }}"

    # Outer loop state (0 = unlimited)
    max_generations: "{{ input.max_generations | default(0) }}"
    generation: 0
    parent_id: null
    parent_score: null
    sibling_summary: []
    parent_selection: "{{ input.parent_selection | default('model') }}"

    # Parent selector context
    parent_candidates: ""
    archive_summary: ""
    parent_selection_text: ""
    parent_selection_reason: ""
    parent_selection_source: ""
    parent_selection_attempts: 0
    parent_selection_needs_retry: false
    parent_selection_feedback: ""

    # Shared state
    best_score: null
    archive_size: 0

  agents:
    coder: ./agents/agent.yml
    parent_selector: ./agents/parent_selector.yml

  states:
    start:
      type: initial
      transitions:
        - to: select_parent

    # ── Outer Loop: Generation Management ──

    select_parent:
      action: prepare_parent_selection_context
      transitions:
        - to: select_parent_model

    select_parent_model:
      agent: parent_selector
      input:
        generation: "{{ context.generation }}"
        parent_selection: "{{ context.parent_selection }}"
        archive_size: "{{ context.archive_size }}"
        parent_candidates: "{{ context.parent_candidates }}"
        archive_summary: "{{ context.archive_summary }}"
        selection_attempts: "{{ context.parent_selection_attempts | default(0) }}"
        selection_feedback: "{{ context.parent_selection_feedback | default('') }}"
      output_to_context:
        parent_selection_text: "{{ output.content }}"
      transitions:
        - to: apply_parent_selection

    apply_parent_selection:
      action: apply_parent_selection
      transitions:
        - condition: "context.parent_selection_needs_retry"
          to: select_parent_model
        - to: setup_worktree

    setup_worktree:
      action: create_isolated_worktree
      transitions:
        - to: improve

    # ── Agent owns the full experiment lifecycle ──

    improve:
      agent: coder
      tool_loop:
        max_turns: 30
        max_tool_calls: 100
        max_cost: 2.00
        tool_timeout: 120
        total_timeout: 600
      input:
        working_dir: "{{ context.worktree_path | default(context.working_dir) }}"
        host_working_dir: "{{ context.working_dir }}"

      output_to_context:
        analysis: "{{ output.content }}"
      transitions:
        - to: archive_generation

    # ── Back to Outer Loop ──

    archive_generation:
      action: extract_diff_and_archive
      transitions:
        - to: cleanup_worktree

    cleanup_worktree:
      action: cleanup_isolated_worktree
      transitions:
        - to: outer_budget_check

    outer_budget_check:
      transitions:
        - condition: "context.max_generations > 0 and context.generation >= context.max_generations"
          to: done
        - to: select_parent

    done:
      type: final
      output:
        generations: "{{ context.generation }}"
        archive_size: "{{ context.archive_size }}"
        best_score: "{{ context.best_score }}"
        best_generation: "{{ context.best_generation | default(0) }}"
        summary: >
          Self-improvement complete. {{ context.generation }} generations,
          {{ context.archive_size }} variants in archive.
          Best score: {{ context.best_score }}
          from generation {{ context.best_generation | default(0) }}.

metadata:
  description: >
    Self-improvement loop. Agent owns the full experiment lifecycle
    (discover/write benchmark, measure, edit, commit/revert, repeat).
    Parent selection is model-driven from archive context.
    Machine handles only infrastructure: worktree isolation, archive,
    parent selection application, cleanup.
  tags:
    - self-improvement
    - coding-machine
    - experiment-loop
