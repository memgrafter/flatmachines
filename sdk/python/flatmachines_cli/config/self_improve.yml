spec: flatmachine
spec_version: "2.5.0"

data:
  name: self-improve
  max_steps: 500

  context:
    # Target
    target_dir: "{{ input.target_dir }}"
    benchmark_command: "{{ input.benchmark_command }}"
    test_command: "{{ input.test_command | default('') }}"
    metric_name: "{{ input.metric_name | default('score') }}"
    metric_direction: "{{ input.metric_direction | default('higher') }}"
    working_dir: "{{ input.working_dir | default('.') }}"

    # Evaluation firewall — cannot be changed by the agent
    eval_spec:
      benchmark_command: "{{ input.benchmark_command }}"
      metric_name: "{{ input.metric_name | default('score') }}"
      direction: "{{ input.metric_direction | default('higher') }}"
      timeout_s: "{{ input.timeout_s | default(300) | float }}"
      checks_command: "{{ input.checks_command | default('') }}"
      protected_paths: "{{ input.protected_paths | default([]) }}"
      editable_patterns: "{{ input.editable_patterns | default(['**/*.py']) }}"

    # Outer loop state
    max_generations: 1
    generation: 0
    parent_id: null
    parent_score: null
    sibling_summary: []
    parent_selection: "{{ input.parent_selection | default('best') }}"

    # Shared state
    best_score: null
    archive_size: 0

  agents:
    coder: ./agents/agent.yml

  states:
    start:
      type: initial
      transitions:
        - to: select_parent

    # ── Outer Loop: Generation Management ──

    select_parent:
      action: select_parent_from_archive
      transitions:
        - to: setup_worktree

    setup_worktree:
      action: create_isolated_worktree
      transitions:
        - to: improve

    # ── Agent does everything ──

    improve:
      agent: coder
      tool_loop:
        max_turns: 30
        max_tool_calls: 100
        max_cost: 2.00
        tool_timeout: 120
        total_timeout: 600
      input:
        working_dir: "{{ context.worktree_path | default(context.working_dir) }}"
        benchmark_command: "{{ context.eval_spec.benchmark_command }}"
        metric_name: "{{ context.eval_spec.metric_name }}"
        metric_direction: "{{ context.metric_direction }}"
        editable_patterns: "{{ context.eval_spec.editable_patterns | join(', ') }}"
        protected_paths: "{{ context.eval_spec.protected_paths | join(', ') }}"
        best_score: "{{ context.best_score }}"
        parent_score: "{{ context.parent_score }}"
        parent_id: "{{ context.parent_id }}"

      output_to_context:
        analysis: "{{ output.content }}"
      transitions:
        - to: evaluate

    evaluate:
      action: run_evaluation
      transitions:
        - to: archive_generation

    # ── Back to Outer Loop ──

    archive_generation:
      action: extract_diff_and_archive
      transitions:
        - to: cleanup_worktree

    cleanup_worktree:
      action: cleanup_isolated_worktree
      transitions:
        - to: outer_budget_check

    outer_budget_check:
      transitions:
        - condition: "context.generation >= context.max_generations"
          to: done
        - to: select_parent

    done:
      type: final
      output:
        generations: "{{ context.generation }}"
        archive_size: "{{ context.archive_size }}"
        best_score: "{{ context.best_score }}"
        best_generation: "{{ context.best_generation | default(0) }}"
        summary: >
          Self-improvement complete. {{ context.generation }} generations,
          {{ context.archive_size }} variants in archive.
          Best {{ context.eval_spec.metric_name }}: {{ context.best_score }}
          from generation {{ context.best_generation | default(0) }}.

metadata:
  description: >
    Self-improvement loop. Agent owns the full experiment cycle
    (edit, benchmark, commit/revert, repeat) within a single tool loop.
    Machine handles infrastructure: worktree isolation, archive,
    parent selection, cleanup.
  tags:
    - self-improvement
    - coding-machine
    - experiment-loop
