spec: flatmachine
spec_version: "2.5.0"

data:
  name: self-improve
  max_steps: 100

  context:
    # Input
    target_dir: "{{ input.target_dir }}"
    benchmark_command: "{{ input.benchmark_command }}"
    test_command: "{{ input.test_command | default('') }}"
    metric_name: "{{ input.metric_name | default('score') }}"
    metric_direction: "{{ input.metric_direction | default('higher') }}"
    max_iterations: 10
    working_dir: "{{ input.working_dir | default('.') }}"

    # State tracked by the machine
    iteration: 0
    baseline_score: null
    best_score: null
    current_score: null
    last_status: ""
    improvement_history: []
    consecutive_failures: 0

  agents:
    coder: ./agents/coder.yml

  states:
    start:
      type: initial
      transitions:
        - to: improve

    improve:
      agent: coder
      tool_loop:
        max_turns: 40
        max_tool_calls: 120
        max_cost: 5.00
        tool_timeout: 120
        total_timeout: 1200
      input:
        task: |
          You are a self-improving coding agent. Your job is to improve the
          codebase and verify the improvement via benchmarks.

          ## Target
          Directory: {{ context.target_dir }}
          Working directory: {{ context.working_dir }}

          ## Benchmark
          Command: {{ context.benchmark_command }}
          Metric: {{ context.metric_name }} ({{ context.metric_direction }} is better)
          {% if context.test_command %}Test command: {{ context.test_command }}{% endif %}

          ## Current State
          Iteration: {{ context.iteration }} / {{ context.max_iterations }}
          Best score: {{ context.best_score }}
          Last status: {{ context.last_status }}

          ## Context Recovery
          At the start of each iteration, read the FULL experiment history and git log.
          These are your only artifacts between sessions — never skip them:
          1. Read the experiment log: `cat {{ context.working_dir }}/experiments.jsonl`
          2. Read the git log: `git log --oneline -30`
          3. Read any ideas backlog if it exists: `cat ideas.md 2>/dev/null`

          The experiment log contains EVERY past result — what was tried, the score,
          keep/discard status. Read ALL of it. Do not skip entries. Past failures
          are critical context to avoid repeating dead ends.

          ## Instructions
          1. Read experiment history and git log (see above)
          2. Run the benchmark to see current performance
          3. Analyze the code and identify the highest-impact improvement
          4. Implement the change (keep it focused and reversible)
          5. Run the benchmark again to measure the effect
          {% if context.test_command %}6. Run the tests to verify nothing is broken{% endif %}
          7. If you discover promising ideas you won't try now, append them to ideas.md

          Report what you changed and the before/after benchmark scores.

      output_to_context:
        analysis: "{{ output.content }}"
      transitions:
        - to: evaluate

    evaluate:
      action: evaluate_improvement
      transitions:
        - condition: "context.last_status == 'improved'"
          to: archive_keep
        - to: archive_discard

    archive_keep:
      action: archive_result
      transitions:
        - to: check_budget

    archive_discard:
      action: revert_changes
      transitions:
        - to: check_budget

    check_budget:
      transitions:
        - condition: "context.iteration >= context.max_iterations"
          to: done
        - condition: "context.consecutive_failures >= 5"
          to: done
        - to: improve

    done:
      type: final
      output:
        best_score: "{{ context.best_score }}"
        iterations: "{{ context.iteration }}"
        history: "{{ context.improvement_history }}"
        summary: "Self-improvement complete. Best {{ context.metric_name }}: {{ context.best_score }} over {{ context.iteration }} iterations."

metadata:
  description: >
    Self-improvement loop using the coding machine pattern.
    One agent state with full tool_loop (bash, read, write, edit) — the agent
    decides what to analyze, implement, and test within its turns.
    The machine handles the outer loop: evaluate benchmark, keep/discard,
    git commit/revert, budget tracking.
    Works with any coding agent adapter via profiles.yml.
  tags:
    - self-improvement
    - coding-machine
    - experiment-loop
